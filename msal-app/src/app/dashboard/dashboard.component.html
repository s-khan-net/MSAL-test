<div style="max-width: 720px; margin: 0 auto;">
    <h1>Dashboard</h1>

    <p *ngIf="username">Welcome, {{ username }}!</p>
    <p *ngIf="!username">You are signed in, but we could not determine your username.</p>

    <section style="margin-top: 16px;">
        <h2>Fake API response</h2>

        <div *ngIf="!apiResponse">Loading...</div>

        <pre *ngIf="apiResponse" style="background: #f6f8fa; padding: 12px; border-radius: 6px; overflow: auto;">
{{ apiResponse | json }}
    </pre>
    </section>
</div>
